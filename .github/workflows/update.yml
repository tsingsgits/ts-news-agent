name: Update T's News Agent

on:
  schedule:
    # 13:00 UTC daily = 6:00 AM PDT / 5:00 AM PST.
    # Adjust the hour below if you want a different time.
    - cron: '0 13 * * *'
  workflow_dispatch: {}   # lets you trigger a manual run from the Actions tab

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Fetch feeds and build page
        run: python scripts/fetch_news.py

      - name: Commit and push if changed
        run: |
          git config user.name "news-agent-bot"
          git config user.email "actions@github.com"
          git add index.html
          git diff --quiet --cached || git commit -m "Daily update: $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push
